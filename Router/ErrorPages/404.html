<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; text-align: center; padding-top: 15%; }
        .code { font-size: 80px; color: #333; margin-bottom: 20px; }
        .title { font-size: 24px; color: #333; margin-bottom: 4px; }
        .title-en { font-size: 16px; color: #999; margin-bottom: 16px; }
        .desc { font-size: 14px; color: #666; margin-bottom: 30px; }
        .countdown { font-size: 14px; color: #999; margin-bottom: 20px; }
        a { display: inline-block; padding: 10px 30px; background: #333; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; }
        a:hover { background: #555; }
    </style>
</head>
<body>
    <div class="code">404</div>
    <div class="title">页面未找到</div>
    <div class="title-en">Not Found</div>
    <div class="desc">您访问的页面不存在或已被移动</div>
    <div class="countdown">将在 <span id="countdown">10</span> 秒后返回首页</div>
    <a href="/">返回首页</a>
    <script>
        let count = 10;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            count--;
            el.textContent = count;
            if (count <= 0) { clearInterval(timer); window.location.href = '/'; }
        }, 1000);
    </script>
</body>
</html>
