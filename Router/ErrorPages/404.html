<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto}
        body{height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;color:#fff}
        .box{text-align:center}
        h1{font-size:120px;font-weight:800;opacity:.3;margin-bottom:-20px}
        h2{font-size:32px;margin-bottom:16px}
        p{font-size:16px;opacity:.8;margin-bottom:32px}
        .btn{padding:12px 32px;background:#fff;color:#667eea;border:none;border-radius:8px;font-weight:600;text-decoration:none;display:inline-block}
        .footer{margin-top:60px;opacity:.6;font-size:14px}
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <h2>页面未找到</h2>
        <p>抱歉，您访问的路由不存在</p>
        <a href="http://localhost:726/" class="btn">返回管理后台</a>
        <div class="footer">APIBay Router</div>
    </div>
</body>
</html>
